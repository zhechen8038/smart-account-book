spring.application.name=project1-server
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/project1?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret}
jwt.expiration=604800000

qwen.api-key=${DASHSCOPE_API_KEY:}
qwen.model=${QWEN_MODEL:qwen3.5-omni-flash}
qwen.base-url=${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
